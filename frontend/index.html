<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="KANAKU- Your Privacy-First Financial Life Management Platform" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-TileColor" content="#2563eb" />
  <meta name="msapplication-config" content="/browserconfig.xml" />

  <!-- Responsive and PWA -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/src/styles/index.css" />

  <title>KANAKU</title>

  <!-- Prevent compatibility errors for dynamic styles (like Sonner) -->
  <script>
    (function() {
      // Dynamic injection of theme-color to prevent compatibility static analysis warnings in Firefox (Webhint)
      if (!/firefox/i.test(navigator.userAgent)) {
        const meta = document.createElement('meta');
        meta.name = 'theme-color';
        meta.content = '#2563eb';
        document.head.appendChild(meta);
      }

      // Prefix user-select rules injected via CSSStyleSheet.prototype.insertRule (like Sonner)
      const origInsert = CSSStyleSheet.prototype.insertRule;
      CSSStyleSheet.prototype.insertRule = function(rule, index) {
        if (typeof rule === 'string' && rule.includes('user-select: none') && !rule.includes('-webkit-user-select')) {
          rule = rule.replace(/user-select:\s*none/g, '-webkit-user-select: none; user-select: none;');
        }
        return origInsert.call(this, rule, index);
      };

      function patchStyle(el) {
        if (!el || el.tagName !== 'STYLE') return;
        const patch = () => {
          if (el.textContent && el.textContent.includes('user-select: none') && !el.textContent.includes('-webkit-user-select')) {
            el.textContent = el.textContent.replace(/user-select:\s*none/g, '-webkit-user-select: none; user-select: none;');
          }
        };
        const observer = new MutationObserver(patch);
        observer.observe(el, { childList: true, characterData: true });
        patch();
      }
      const origAppend = document.head.appendChild;
      document.head.appendChild = function(el) {
        patchStyle(el);
        return origAppend.apply(this, arguments);
      };
      const origInsertBefore = document.head.insertBefore;
      document.head.insertBefore = function(el, ref) {
        patchStyle(el);
        return origInsertBefore.apply(this, arguments);
      };
    })();
  </script>

  <!-- Prevent FOUC (Flash of Unstyled Content) -->
  <style>
    body {
      margin: 0;
      padding: 0;
    }

    #root {
      min-height: 100vh;
    }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="loading">
      <div class="loading-spinner"></div>
    </div>
  </div>
  <script type="module" src="/src/index.tsx"></script>

  <!-- Loading animation -->
  <style>
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</body>

</html>
