openapi: 3.1.0
info:
  title: Kanaku API
  version: "1.0.0"
  description: >-
    Financial-grade, offline-first expense tracker. All routes are mounted under
    `/api/v1`, JWT-protected unless marked PUBLIC, Zod-validated on mutating
    routes, ownership-checked, and monetary writes are wrapped in
    `prisma.$transaction`. Schemas are transcribed from
    `backend/src/features/*/*.validation.ts`. Amounts are stored as
    `Decimal(18,2)` server-side. Generated as a static companion to the live
    spec served at `GET /api/v1/docs`.
servers:
  - url: https://api.kanaku.app/api/v1
    description: Production (Fly.io via Vercel edge proxy)
  - url: http://localhost:4000/api/v1
    description: Local dev

security:
  - bearerAuth: []

tags:
  - { name: auth }
  - { name: pin }
  - { name: otp }
  - { name: sessions }
  - { name: devices }
  - { name: settings }
  - { name: avatars }
  - { name: accounts }
  - { name: transactions }
  - { name: recurring }
  - { name: categorization }
  - { name: goals }
  - { name: budgets }
  - { name: loans }
  - { name: investments }
  - { name: stocks }
  - { name: gold }
  - { name: bills }
  - { name: tax }
  - { name: dashboard }
  - { name: friends }
  - { name: groups }
  - { name: todos }
  - { name: collaboration }
  - { name: advisors }
  - { name: bookings }
  - { name: payments }
  - { name: notifications }
  - { name: sync }
  - { name: import }
  - { name: receipts }
  - { name: voice }
  - { name: ai }
  - { name: aa }
  - { name: admin }
  - { name: webhooks }

paths:
  # ---------------- auth ----------------
  /auth/check-email:
    post:
      tags: [auth]
      summary: Check email availability (PUBLIC)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, properties: { email: { type: string, format: email } }, required: [email] }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "429": { $ref: "#/components/responses/RateLimited" }
  /auth/register:
    post:
      tags: [auth]
      summary: Register (PUBLIC, strong password)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterInput" }
      responses:
        "201": { $ref: "#/components/responses/AuthTokensResponse" }
        "400": { $ref: "#/components/responses/ValidationError" }
  /auth/login/challenge:
    post:
      tags: [auth]
      summary: Login step 1 — issue 6-digit challenge (PUBLIC)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginInput" }
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /auth/login:
    post:
      tags: [auth]
      summary: Login step 2 — exchange challenge for tokens (PUBLIC)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/LoginInput"
                - type: object
                  properties: { challengeCode: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/AuthTokensResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/refresh:
    post: { tags: [auth], summary: Rotate refresh token, responses: { "200": { $ref: "#/components/responses/AuthTokensResponse" } } }
  /auth/logout:
    post: { tags: [auth], summary: Logout (denylist refresh), responses: { "204": { description: No Content } } }
  /auth/profile:
    get: { tags: [auth], summary: Get profile, responses: { "200": { $ref: "#/components/responses/Success" } } }
    put:
      tags: [auth]
      summary: Update profile
      requestBody: { content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /auth/otp/send:
    post: { tags: [auth], summary: Send OTP for email/mobile change, responses: { "200": { $ref: "#/components/responses/Success" } } }
  /auth/otp/verify:
    post: { tags: [auth], summary: Verify OTP, responses: { "200": { $ref: "#/components/responses/Success" } } }
  /auth/account:
    delete: { tags: [auth], summary: Delete account (destructive, rate-limited), responses: { "204": { description: No Content } } }

  # ---------------- pin ----------------
  /pin/create:
    post:
      tags: [pin]
      summary: Create PIN
      requestBody: { content: { application/json: { schema: { $ref: "#/components/schemas/PinCreate" } } } }
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /pin/verify:
    post:
      tags: [pin]
      summary: Verify PIN (lockout after 5)
      requestBody: { content: { application/json: { schema: { $ref: "#/components/schemas/PinVerify" } } } }
      responses: { "200": { $ref: "#/components/responses/Success" }, "401": { $ref: "#/components/responses/Unauthorized" } }
  /pin/verify-security:
    post: { tags: [pin], summary: Verify security answer, responses: { "200": { $ref: "#/components/responses/Success" } } }
  /pin/update:
    post:
      tags: [pin]
      summary: Change PIN (securityGate)
      requestBody: { content: { application/json: { schema: { $ref: "#/components/schemas/PinUpdate" } } } }
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /pin/status:
    get: { tags: [pin], summary: PIN status, responses: { "200": { $ref: "#/components/responses/Success" } } }
  /pin/key-backup:
    get: { tags: [pin], summary: Get encryption key backup, responses: { "200": { $ref: "#/components/responses/Success" } } }
    post: { tags: [pin], summary: Store encryption key backup, responses: { "200": { $ref: "#/components/responses/Success" } } }
    delete: { tags: [pin], summary: Delete key backup, responses: { "204": { description: No Content } } }
  /pin/expiring-soon:
    get: { tags: [pin], summary: PIN expiry warning, responses: { "200": { $ref: "#/components/responses/Success" } } }
  /pin/reset:
    post: { tags: [pin], summary: Reset PIN via OTP, responses: { "200": { $ref: "#/components/responses/Success" } } }
  /pin/self-reset:
    post: { tags: [pin], summary: Self reset PIN (securityGate), responses: { "200": { $ref: "#/components/responses/Success" } } }

  # ---------------- otp ----------------
  /otp/send:
    post:
      tags: [otp]
      summary: Send OTP
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/OtpSend" } } } }
      responses: { "200": { $ref: "#/components/responses/Success" }, "429": { $ref: "#/components/responses/RateLimited" } }
  /otp/verify:
    post:
      tags: [otp]
      summary: Verify OTP
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/OtpVerify" } } } }
      responses: { "200": { $ref: "#/components/responses/Success" } }

  # ---------------- accounts ----------------
  /accounts:
    get:
      tags: [accounts]
      summary: List accounts (cached)
      responses: { "200": { $ref: "#/components/responses/Success" } }
    post:
      tags: [accounts]
      summary: Create account (feature-gated)
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/AccountCreate" } } } }
      responses: { "201": { $ref: "#/components/responses/Success" }, "400": { $ref: "#/components/responses/ValidationError" } }
  /accounts/{id}:
    parameters: [{ $ref: "#/components/parameters/IdPath" }]
    get: { tags: [accounts], summary: Get account (cached), responses: { "200": { $ref: "#/components/responses/Success" }, "404": { $ref: "#/components/responses/NotFound" } } }
    put:
      tags: [accounts]
      summary: Update account
      requestBody: { content: { application/json: { schema: { $ref: "#/components/schemas/AccountUpdate" } } } }
      responses: { "200": { $ref: "#/components/responses/Success" } }
    delete: { tags: [accounts], summary: Delete account, responses: { "204": { description: No Content } } }

  # ---------------- transactions ----------------
  /transactions:
    get:
      tags: [transactions]
      summary: List transactions
      parameters:
        - { name: accountId, in: query, schema: { type: string } }
        - { name: startDate, in: query, schema: { type: string } }
        - { name: endDate, in: query, schema: { type: string } }
        - { name: category, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, minimum: 1 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 200 } }
      responses: { "200": { $ref: "#/components/responses/Success" } }
    post:
      tags: [transactions]
      summary: Create transaction (atomic balance)
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/TransactionCreate" } } } }
      responses: { "201": { $ref: "#/components/responses/Success" }, "400": { $ref: "#/components/responses/ValidationError" } }
  /transactions/bulk:
    post:
      tags: [transactions]
      summary: Bulk create (voice/import, max 100)
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transactions]
              properties:
                transactions:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items: { $ref: "#/components/schemas/TransactionCreate" }
      responses: { "201": { $ref: "#/components/responses/Success" } }
  /transactions/{id}:
    parameters: [{ $ref: "#/components/parameters/IdPath" }]
    patch:
      tags: [transactions]
      summary: Update transaction (atomic recalc)
      requestBody: { content: { application/json: { schema: { $ref: "#/components/schemas/TransactionUpdate" } } } }
      responses: { "200": { $ref: "#/components/responses/Success" } }
    delete: { tags: [transactions], summary: Delete transaction (atomic recalc), responses: { "204": { description: No Content } } }

  # ---------------- recurring ----------------
  /recurring:
    get:
      tags: [recurring]
      summary: List recurring
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [active, paused, cancelled] } }
        - { name: interval, in: query, schema: { type: string, enum: [weekly, monthly, yearly] } }
      responses: { "200": { $ref: "#/components/responses/Success" } }
    post:
      tags: [recurring]
      summary: Create recurring
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/RecurringCreate" } } } }
      responses: { "201": { $ref: "#/components/responses/Success" } }
  /recurring/{id}:
    parameters: [{ $ref: "#/components/parameters/IdPath" }]
    get: { tags: [recurring], summary: Get recurring, responses: { "200": { $ref: "#/components/responses/Success" } } }
    put: { tags: [recurring], summary: Update recurring, responses: { "200": { $ref: "#/components/responses/Success" } } }
    delete: { tags: [recurring], summary: Delete recurring, responses: { "204": { description: No Content } } }
  /recurring/{id}/toggle:
    patch:
      tags: [recurring]
      summary: Toggle active/paused
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses: { "200": { $ref: "#/components/responses/Success" } }

  # ---------------- categorization ----------------
  /categorization:
    post:
      tags: [categorization]
      summary: Predict category
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [text], properties: { text: { type: string, maxLength: 500 } } } } } }
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /categorization/learn:
    post:
      tags: [categorization]
      summary: Learn from correction
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CategorizationLearn" } } } }
      responses: { "200": { $ref: "#/components/responses/Success" } }

  # ---------------- goals ----------------
  /goals:
    get: { tags: [goals], summary: List goals (cached), responses: { "200": { $ref: "#/components/responses/Success" } } }
    post:
      tags: [goals]
      summary: Create goal (idempotent)
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/GoalCreate" } } } }
      responses: { "201": { $ref: "#/components/responses/Success" } }
  /goals/{id}:
    parameters: [{ $ref: "#/components/parameters/IdPath" }]
    get: { tags: [goals], summary: Get goal, responses: { "200": { $ref: "#/components/responses/Success" } } }
    put: { tags: [goals], summary: Update goal, responses: { "200": { $ref: "#/components/responses/Success" } } }
    delete: { tags: [goals], summary: Delete goal, responses: { "204": { description: No Content } } }
  /goals/{id}/members:
    parameters: [{ $ref: "#/components/parameters/IdPath" }]
    get: { tags: [goals], summary: List goal members, responses: { "200": { $ref: "#/components/responses/Success" } } }
    post:
      tags: [goals]
      summary: Add goal member (idempotent)
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/GoalMemberAdd" } } } }
      responses: { "201": { $ref: "#/components/responses/Success" } }
  /goals/{id}/members/{memberId}:
    delete:
      tags: [goals]
      summary: Remove goal member
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - { name: memberId, in: path, required: true, schema: { type: string } }
      responses: { "204": { description: No Content } }

  # ---------------- budgets ----------------
  /budgets:
    get:
      tags: [budgets]
      summary: List budgets
      parameters:
        - { name: period, in: query, schema: { type: string, enum: [weekly, monthly, yearly] } }
        - { name: category, in: query, schema: { type: string } }
      responses: { "200": { $ref: "#/components/responses/Success" } }
    post:
      tags: [budgets]
      summary: Create budget
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/BudgetCreate" } } } }
      responses: { "201": { $ref: "#/components/responses/Success" } }
  /budgets/{id}:
    parameters: [{ $ref: "#/components/parameters/IdPath" }]
    get: { tags: [budgets], summary: Get budget, responses: { "200": { $ref: "#/components/responses/Success" } } }
    put: { tags: [budgets], summary: Update budget, responses: { "200": { $ref: "#/components/responses/Success" } } }
    delete: { tags: [budgets], summary: Delete budget, responses: { "204": { description: No Content } } }
  /budgets/{id}/recalculate:
    post:
      tags: [budgets]
      summary: Recalculate spent
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses: { "200": { $ref: "#/components/responses/Success" } }

  # ---------------- loans ----------------
  /loans:
    get: { tags: [loans], summary: List loans (cached), responses: { "200": { $ref: "#/components/responses/Success" } } }
    post:
      tags: [loans]
      summary: Create loan (idempotent)
      parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/LoanCreate" } } } }
      responses: { "201": { $ref: "#/components/responses/Success" } }
  /loans/{id}:
    parameters: [{ $ref: "#/components/parameters/IdPath" }]
    get: { tags: [loans], summary: Get loan, responses: { "200": { $ref: "#/components/responses/Success" } } }
    put: { tags: [loans], summary: Update loan, responses: { "200": { $ref: "#/components/responses/Success" } } }
    delete: { tags: [loans], summary: Delete loan, responses: { "204": { description: No Content } } }
  /loans/{id}/payments:
    post:
      tags: [loans]
      summary: Record EMI payment (atomic)
      parameters: [{ $ref: "#/components/parameters/IdPath" }, { $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/LoanPayment" } } } }
      responses: { "200": { $ref: "#/components/responses/Success" } }

  # ---------------- investments ----------------
  /investments:
    get: { tags: [investments], summary: List investments, responses: { "200": { $ref: "#/components/responses/Success" } } }
    post:
      tags: [investments]
      summary: Create investment
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/InvestmentCreate" } } } }
      responses: { "201": { $ref: "#/components/responses/Success" } }
  /investments/{id}:
    parameters: [{ $ref: "#/components/parameters/IdPath" }]
    get: { tags: [investments], summary: Get investment, responses: { "200": { $ref: "#/components/responses/Success" } } }
    put: { tags: [investments], summary: Update investment, responses: { "200": { $ref: "#/components/responses/Success" } } }
    delete: { tags: [investments], summary: Delete investment, responses: { "204": { description: No Content } } }

  # ---------------- stocks ----------------
  /stocks/markets:
    get: { tags: [stocks], summary: List markets, responses: { "200": { $ref: "#/components/responses/Success" } } }
  /stocks/search:
    get:
      tags: [stocks]
      summary: Search symbols
      parameters: [{ name: q, in: query, schema: { type: string } }]
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /stocks/stock:
    get:
      tags: [stocks]
      summary: Quote (cached 60s)
      parameters: [{ name: symbol, in: query, schema: { type: string } }]
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /stocks/batch:
    get:
      tags: [stocks]
      summary: Batch quotes
      parameters: [{ name: symbols, in: query, schema: { type: string } }]
      responses: { "200": { $ref: "#/components/responses/Success" } }

  # ---------------- gold ----------------
  /gold:
    get:
      tags: [gold]
      summary: List gold assets
      parameters: [{ name: type, in: query, schema: { type: string, enum: [gold, jewelry, coin] } }]
      responses: { "200": { $ref: "#/components/responses/Success" } }
    post:
      tags: [gold]
      summary: Create gold asset
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/GoldCreate" } } } }
      responses: { "201": { $ref: "#/components/responses/Success" } }
  /gold/{id}:
    parameters: [{ $ref: "#/components/parameters/IdPath" }]
    get: { tags: [gold], summary: Get gold asset, responses: { "200": { $ref: "#/components/responses/Success" } } }
    put: { tags: [gold], summary: Update gold asset, responses: { "200": { $ref: "#/components/responses/Success" } } }
    delete: { tags: [gold], summary: Delete gold asset, responses: { "204": { description: No Content } } }

  # ---------------- bills ----------------
  /bills:
    get: { tags: [bills], summary: List bills, responses: { "200": { $ref: "#/components/responses/Success" } } }
    post:
      tags: [bills]
      summary: Upload bill (multipart, rate-limited)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { type: object, properties: { file: { type: string, format: binary }, transactionId: { type: string } } }
      responses: { "201": { $ref: "#/components/responses/Success" } }
  /bills/{id}:
    parameters: [{ $ref: "#/components/parameters/IdPath" }]
    get: { tags: [bills], summary: Get bill, responses: { "200": { $ref: "#/components/responses/Success" } } }
    delete: { tags: [bills], summary: Delete bill, responses: { "204": { description: No Content } } }

  # ---------------- tax ----------------
  /tax:
    get:
      tags: [tax]
      summary: List tax calculations
      parameters: [{ name: year, in: query, schema: { type: integer } }]
      responses: { "200": { $ref: "#/components/responses/Success" } }
    post:
      tags: [tax]
      summary: Create tax calculation
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/TaxCalcCreate" } } } }
      responses: { "201": { $ref: "#/components/responses/Success" } }
  /tax/{id}:
    parameters: [{ $ref: "#/components/parameters/IdPath" }]
    get: { tags: [tax], summary: Get tax calculation, responses: { "200": { $ref: "#/components/responses/Success" } } }
    put: { tags: [tax], summary: Update tax calculation, responses: { "200": { $ref: "#/components/responses/Success" } } }
    delete: { tags: [tax], summary: Delete tax calculation, responses: { "204": { description: No Content } } }

  # ---------------- dashboard ----------------
  /dashboard/summary:
    get: { tags: [dashboard], summary: Aggregated summary (cached 30s), responses: { "200": { $ref: "#/components/responses/Success" } } }
  /dashboard/cashflow:
    get: { tags: [dashboard], summary: Cashflow, responses: { "200": { $ref: "#/components/responses/Success" } } }

  # ---------------- friends ----------------
  /friends:
    get: { tags: [friends], summary: List friends, responses: { "200": { $ref: "#/components/responses/Success" } } }
    post:
      tags: [friends]
      summary: Create friend (email OR phone required)
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/FriendCreate" } } } }
      responses: { "201": { $ref: "#/components/responses/Success" } }
  /friends/bulk:
    post:
      tags: [friends]
      summary: Bulk create (max 200)
      requestBody: { required: true, content: { application/json: { schema: { type: object, properties: { friends: { type: array, items: { $ref: "#/components/schemas/FriendCreate" } } } } } } }
      responses: { "201": { $ref: "#/components/responses/Success" } }
  /friends/import:
    post:
      tags: [friends]
      summary: Import friends CSV (multipart)
      requestBody: { required: true, content: { multipart/form-data: { schema: { type: object, properties: { file: { type: string, format: binary } } } } } }
      responses: { "201": { $ref: "#/components/responses/Success" } }
  /friends/{id}:
    parameters: [{ $ref: "#/components/parameters/IdPath" }]
    get: { tags: [friends], summary: Get friend, responses: { "200": { $ref: "#/components/responses/Success" } } }
    put: { tags: [friends], summary: Update friend, responses: { "200": { $ref: "#/components/responses/Success" } } }
    delete: { tags: [friends], summary: Delete friend, responses: { "204": { description: No Content } } }

  # ---------------- groups ----------------
  /groups:
    get: { tags: [groups], summary: List groups, responses: { "200": { $ref: "#/components/responses/Success" } } }
    post:
      tags: [groups]
      summary: Create group expense
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/GroupCreate" } } } }
      responses: { "201": { $ref: "#/components/responses/Success" } }
  /groups/repair-all-members:
    post: { tags: [groups], summary: Repair all group members, responses: { "200": { $ref: "#/components/responses/Success" } } }
  /groups/{id}:
    parameters: [{ $ref: "#/components/parameters/IdPath" }]
    get: { tags: [groups], summary: Get group, responses: { "200": { $ref: "#/components/responses/Success" } } }
    put: { tags: [groups], summary: Update group, responses: { "200": { $ref: "#/components/responses/Success" } } }
    delete: { tags: [groups], summary: Delete group, responses: { "204": { description: No Content } } }
  /groups/{id}/repair-members:
    post:
      tags: [groups]
      summary: Repair group members
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses: { "200": { $ref: "#/components/responses/Success" } }

  # ---------------- todos ----------------
  /todos:
    get: { tags: [todos], summary: List todos, responses: { "200": { $ref: "#/components/responses/Success" } } }
    post:
      tags: [todos]
      summary: Create todo
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [title], properties: { title: { type: string }, completed: { type: boolean } } } } } }
      responses: { "201": { $ref: "#/components/responses/Success" } }
