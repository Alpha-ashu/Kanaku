components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema: { type: string, minLength: 1 }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string, format: uuid }
      description: Dedupe key (24h TTL in Redis); set to the client-generated record id.

  responses:
    Success:
      description: Standard success envelope
      content:
        application/json:
          schema: { $ref: "#/components/schemas/SuccessEnvelope" }
    ValidationError:
      description: Zod validation failure (generic; issues logged server-side only)
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorEnvelope"
              - type: object
                properties: { code: { const: VALIDATION_ERROR } }
    Unauthorized:
      description: Missing/invalid/expired token
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
    NotFound:
      description: Resource not found or not owned by caller
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
    RateLimited:
      description: Too many requests
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
    AuthTokensResponse:
      description: Auth tokens + user
      content:
        application/json:
          schema: { $ref: "#/components/schemas/AuthTokens" }

  schemas:
    SuccessEnvelope:
      type: object
      required: [success]
      properties:
        success: { type: boolean, const: true }
        data: {}
        requestId: { type: string }
    ErrorEnvelope:
      type: object
      required: [success, error, code]
      properties:
        success: { type: boolean, const: false }
        error: { type: string, description: Human-safe message (no stack/schema leak) }
        code: { type: string }
        requestId: { type: string }

    Money:
      type: number
      multipleOf: 0.01
      description: Decimal(18,2); server-authoritative.

    RegisterInput:
      type: object
      required: [email, name, password]
      properties:
        email: { type: string, format: email }
        name: { type: string }
        password: { type: string, description: "8+ chars incl. upper, lower, digit, special" }
        role: { type: string, enum: [user, advisor] }
        phone: { type: string }
        mobile: { type: string }
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    AuthTokens:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresAt: { type: integer, description: epoch ms }
        user:
          type: object
          properties:
            id: { type: string }
            email: { type: string }
            name: { type: string }
            role: { type: string }
            isApproved: { type: boolean }
    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        name: { type: string }
        firstName: { type: [string, "null"] }
        lastName: { type: [string, "null"] }
        gender: { type: [string, "null"] }
        country: { type: [string, "null"] }
        state: { type: [string, "null"] }
        city: { type: [string, "null"] }
        dateOfBirth: { type: [string, "null"], format: date }
        jobType: { type: [string, "null"] }
        monthlyIncome: { type: [number, "null"] }
        role: { type: string }
        isApproved: { type: boolean }
        createdAt: { type: string, format: date-time }

    PinCreate: { type: object, properties: { pin: { type: string, minLength: 1, maxLength: 64 } } }
    PinVerify: { type: object, properties: { pin: { type: string, minLength: 1, maxLength: 64 }, deviceId: { type: string, maxLength: 200 } } }
    PinUpdate: { type: object, properties: { currentPin: { type: string, maxLength: 64 }, newPin: { type: string, maxLength: 64 } } }

    OtpSend:
      type: object
      required: [destination, purpose]
      properties:
        destination: { type: string, minLength: 5, maxLength: 100 }
        channel: { type: string, enum: [sms, email], default: email }
        purpose: { type: string, enum: [signup, login, reset_password, aa_consent, sensitive_action] }
    OtpVerify:
      type: object
      required: [destination, purpose, otp]
      properties:
        destination: { type: string, minLength: 5, maxLength: 100 }
        purpose: { type: string, enum: [signup, login, reset_password, aa_consent, sensitive_action] }
        otp: { type: string, pattern: "^\\d{6}$" }

    AccountCreate:
      type: object
      required: [name, type]
      properties:
        name: { type: string, minLength: 1, maxLength: 120 }
        type: { type: string, minLength: 1, maxLength: 60, description: "bank|card|cash|digital" }
        provider: { type: string, maxLength: 120 }
        country: { type: string, maxLength: 60 }
        balance: { allOf: [{ $ref: "#/components/schemas/Money" }], minimum: 0 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        clientRequestId: { type: string }
    AccountUpdate:
      allOf: [{ $ref: "#/components/schemas/AccountCreate" }]
      description: Partial of AccountCreate; at least one field required.

    TransactionCreate:
      type: object
      required: [accountId, type, amount, category, date]
      properties:
        accountId: { type: string, minLength: 1 }
        type: { type: string, enum: [income, expense, transfer, withdrawal] }
        amount: { allOf: [{ $ref: "#/components/schemas/Money" }], minimum: 0, exclusiveMinimum: true, maximum: 999999999 }
        category: { type: string, minLength: 1, maxLength: 80 }
        subcategory: { type: string, maxLength: 80 }
        description: { type: string, maxLength: 200 }
        merchant: { type: string, maxLength: 120 }
        date: { type: string, format: date-time }
        tags: { type: array, items: { type: string, maxLength: 40 } }
        transferToAccountId: { type: string }
        transferType: { type: string, enum: [self-transfer, other-transfer] }
        expenseMode: { type: string, enum: [individual, group, loan] }
        groupExpenseId: { type: string }
        groupName: { type: string, maxLength: 100 }
        splitType: { type: string, enum: [equal, custom] }
        loanType: { type: string, enum: [borrowed, lent] }
        contactName: { type: string, maxLength: 100 }
        interestRate: { type: number, minimum: 0, maximum: 100 }
        loanCategory: { type: string, maxLength: 80 }
        bankName: { type: string, maxLength: 100 }
        tenureMonths: { type: integer, minimum: 1, maximum: 600 }
        emiAmount: { type: number, minimum: 0 }
        downPayment: { type: number, minimum: 0 }
        receivedAccount: { type: string }
        emiDeductionAccountId: { type: string }
        notes: { type: string, maxLength: 500 }
      description: >-
        If type=transfer, transferToAccountId is required (superRefine). clientId
        (uuid) is sent as Idempotency-Key.
    TransactionUpdate:
      allOf: [{ $ref: "#/components/schemas/TransactionCreate" }]
      description: Partial; at least one field required.

    RecurringCreate:
      type: object
      required: [title, amount, category, interval, nextDueDate]
      properties:
        title: { type: string, minLength: 1, maxLength: 100 }
        amount: { allOf: [{ $ref: "#/components/schemas/Money" }], minimum: 0, exclusiveMinimum: true, maximum: 999999999 }
        category: { type: string, minLength: 1, maxLength: 80 }
        subcategory: { type: string, maxLength: 80 }
        interval: { type: string, enum: [weekly, monthly, yearly] }
        nextDueDate: { type: string, format: date-time }
        autoProcess: { type: boolean }
        accountId: { type: string }
        description: { type: string, maxLength: 200 }
        merchant: { type: string, maxLength: 120 }
        clientRequestId: { type: string }

    CategorizationLearn:
      type: object
      required: [text]
      properties:
        text: { type: string, minLength: 1, maxLength: 500 }
        category: { type: string, maxLength: 120 }
        category_id: { type: string, maxLength: 120 }
        subcategory: { type: string, maxLength: 120 }
        subcategory_id: { type: string, maxLength: 120 }
      description: One of category / category_id is required.

    GoalCreate:
      type: object
      required: [name, targetAmount, targetDate]
      properties:
        name: { type: string, minLength: 1, maxLength: 120 }
        targetAmount: { allOf: [{ $ref: "#/components/schemas/Money" }], exclusiveMinimum: true, minimum: 0 }
        targetDate: { type: string, format: date-time }
        category: { type: string, maxLength: 80 }
        isGroupGoal: { type: boolean }
        clientRequestId: { type: string }
    GoalMemberAdd:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
        name: { type: string, maxLength: 120 }

    BudgetCreate:
      type: object
      required: [category, amount, period]
      properties:
        category: { type: string, minLength: 1, maxLength: 80 }
        amount: { allOf: [{ $ref: "#/components/schemas/Money" }], exclusiveMinimum: true, minimum: 0, maximum: 999999999 }
        period: { type: string, enum: [weekly, monthly, yearly] }
        threshold: { type: integer, minimum: 1, maximum: 100 }
        startDate: { type: string, format: date-time }
        endDate: { type: string, format: date-time }
        alertEnabled: { type: boolean }
        alertChannels: { type: array, items: { type: string, enum: [app, email, push] } }
        clientRequestId: { type: string }

    LoanCreate:
      type: object
      required: [type, name, principalAmount]
      properties:
        type: { type: string, minLength: 1, maxLength: 60 }
        name: { type: string, minLength: 1, maxLength: 120 }
        principalAmount: { allOf: [{ $ref: "#/components/schemas/Money" }], exclusiveMinimum: true, minimum: 0 }
        interestRate: { type: number, minimum: 0 }
        emiAmount: { type: number, minimum: 0 }
        dueDate: { type: string, format: date-time }
        frequency: { type: string, maxLength: 40 }
        contactPerson: { type: string, maxLength: 120 }
        clientRequestId: { type: string }
    LoanPayment:
      type: object
      required: [amount]
      properties:
        amount: { allOf: [{ $ref: "#/components/schemas/Money" }], exclusiveMinimum: true, minimum: 0 }
        accountId: { type: string }
        notes: { type: string, maxLength: 200 }

    InvestmentCreate:
      type: object
      required: [assetType, assetName, quantity, buyPrice, currentPrice, purchaseDate]
      properties:
        assetType: { type: string }
        assetName: { type: string }
        quantity: { type: number, exclusiveMinimum: true, minimum: 0 }
        buyPrice: { type: number, minimum: 0 }
        currentPrice: { type: number, minimum: 0 }
        totalInvested: { type: number, minimum: 0 }
        currentValue: { type: number, minimum: 0 }
        profitLoss: { type: number }
        purchaseDate: { type: string }
        lastUpdated: { type: string }
        metadata: {}

    GoldCreate:
      type: object
      required: [type, quantity, unit, purchasePrice, currentPrice, purchaseDate]
      properties:
        type: { type: string, enum: [gold, jewelry, coin] }
        quantity: { type: number, exclusiveMinimum: true, minimum: 0 }
        unit: { type: string, enum: [gram, ounce, kg] }
        purchasePrice: { type: number, exclusiveMinimum: true, minimum: 0 }
        currentPrice: { type: number, minimum: 0 }
        purchaseDate: { type: string, format: date-time }
        purityPercentage: { type: number, minimum: 0, maximum: 100 }
        location: { type: string, maxLength: 200 }
        certificateNumber: { type: string, maxLength: 100 }
        notes: { type: string, maxLength: 500 }
        clientRequestId: { type: string }

    TaxCalcCreate:
      type: object
      required: [year, totalIncome, totalExpense, netProfit, taxableIncome, estimatedTax, taxRate]
      properties:
        year: { type: integer, minimum: 2000, maximum: 2100 }
        regime: { type: string, maxLength: 50 }
        country: { type: string, maxLength: 50 }
        totalIncome: { type: number, minimum: 0 }
        totalExpense: { type: number, minimum: 0 }
        netProfit: { type: number }
        taxableIncome: { type: number, minimum: 0 }
        estimatedTax: { type: number, minimum: 0 }
        taxRate: { type: number, minimum: 0, maximum: 100 }
        deductions: { type: number, minimum: 0 }
        currency: { type: string, maxLength: 10 }
        notes: { type: string, maxLength: 500 }
        metadata: { type: object }
        clientRequestId: { type: string }

    FriendCreate:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 120 }
        email: { type: [string, "null"], maxLength: 255 }
        phone: { type: [string, "null"], maxLength: 40 }
      description: Controller enforces email OR phone required.

    GroupCreate:
      type: object
      required: [name, totalAmount, date, members]
      properties:
        name: { type: string, minLength: 1 }
        totalAmount: { type: number, minimum: 0 }
        paidBy: { oneOf: [{ type: string }, { type: number }] }
        date: { type: string }
        members:
          type: array
          items:
            oneOf:
              - { type: string }
              - $ref: "#/components/schemas/GroupMember"
        items: { type: array, items: { $ref: "#/components/schemas/GroupItem" } }
        description: { type: string }
        category: { type: string }
        splitType: { type: string, enum: [equal, custom] }
        yourShare: { type: number }
        status: { type: string, enum: [pending, settled] }
    GroupMember:
      type: object
      required: [name, share]
      properties:
        name: { type: string, minLength: 1 }
        share: { type: number, minimum: 0 }
        paid: { type: boolean }
        friendId: { oneOf: [{ type: string }, { type: number }] }
        email: { type: string }
        phone: { type: string }
        isCurrentUser: { type: boolean }
        paidAmount: { type: number }
        paymentStatus: { type: string }
    GroupItem:
      type: object
      required: [name, amount]
      properties:
        name: { type: string, minLength: 1 }
        amount: { type: number, minimum: 0 }
        sharedBy: { type: array, items: { type: string } }

    BookingCreate:
      type: object
      required: [advisorId, sessionType, proposedDate, proposedTime, duration, amount]
      properties:
        advisorId: { type: string, minLength: 1 }
        sessionType: { type: string, minLength: 1, maxLength: 60 }
        description: { type: string, maxLength: 1000 }
        proposedDate: { type: string, minLength: 1 }
        proposedTime: { type: string, minLength: 1 }
        duration: { type: integer, minimum: 1, maximum: 600 }
        amount: { type: number, minimum: 0 }

    PaymentInitiate:
      type: object
      required: [sessionId, paymentMethod]
      properties:
        sessionId: { type: string, minLength: 1 }
        paymentMethod: { type: string, minLength: 1 }
        description: { type: string, maxLength: 500 }

    NotificationSend:
      type: object
      required: [userId, title, message]
      properties:
        userId: { type: string, minLength: 1, maxLength: 100 }
        title: { type: string, minLength: 1, maxLength: 300 }
        message: { type: string, minLength: 1, maxLength: 5000 }
        type: { type: string, maxLength: 50 }
        category: { type: string, maxLength: 100 }
        deepLink: { type: string, maxLength: 2000 }

    AiEvent:
      type: object
      required: [eventType]
      properties:
        eventType: { type: string, minLength: 3, maxLength: 80 }
        metadata: { type: object, default: {} }

    AaCreateConsent:
      type: object
      required: [vua, fiTypes, purpose, dataRange]
      properties:
        vua: { type: string, minLength: 3, maxLength: 100 }
        fiTypes:
          type: array
          minItems: 1
          items: { type: string, enum: [DEPOSIT, TERM_DEPOSIT, RECURRING_DEPOSIT, MUTUAL_FUNDS, SIP, INSURANCE, CREDIT_CARD, EQUITIES] }
        consentTypes: { type: array, minItems: 1, items: { type: string }, default: [TRANSACTIONS, SUMMARY] }
        purpose:
          type: object
          required: [code, text]
          properties:
            code: { type: string, minLength: 1, maxLength: 10 }
            text: { type: string, minLength: 1, maxLength: 200 }
        dataRange:
          type: object
          required: [from, to]
          properties:
            from: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }
            to: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }
        consentMode: { type: string, enum: [VIEW, STORE, QUERY], default: VIEW }
        fetchType: { type: string, enum: [ONETIME, PERIODIC], default: ONETIME }
    AaNotification:
      type: object
      required: [type, timestamp]
      properties:
        type: { type: string, enum: [CONSENT_STATUS_UPDATE, FI_DATA_READY, SESSION_STATUS_UPDATE] }
        consentId: { type: string }
        consentHandle: { type: string }
        sessionId: { type: string }
        status: { type: string }
        timestamp: { type: string }

