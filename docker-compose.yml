services:
  postgres:
    image: postgres:15
    container_name: KANAKU_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: KANAKU
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - KANAKU_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: KANAKU_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - postgres
    networks:
      - KANAKU_network

  # NOTE: Redis/Dragonfly/Valkey were removed — the backend caches in-process and
  # delivers notifications via a PostgreSQL outbox (no queue broker). See
  # docs/04_App_Flow/ARCHITECTURE.md.

volumes:
  postgres_data:


networks:
  KANAKU_network:
    driver: bridge

