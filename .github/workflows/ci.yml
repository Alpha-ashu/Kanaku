name: CI — Lint, Type-check & Test
# Env values below are literal CI fixtures (local Postgres service + stubbed Supabase),
# not GitHub secrets. Do not wrap them in ${{ secrets.* }} — undefined secrets produce
# false "Context access might be invalid" lint warnings.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal token scope: these jobs only read the repo (checkout) and talk to a
# local Postgres service — no write access is needed.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Change detection ────────────────────────────────────────────────────────
  # Only spend runner minutes on the area that actually changed. Doc-only commits
  # match neither filter, so both heavy jobs skip. Job-level `if:` skips are
  # treated as PASSED for required status checks, so this never blocks a PR.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'

  # ─── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend (Node.js / Jest)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kanaku_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # Workspace-aware install at the repo root (single hoisted lockfile).
      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kanaku_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/kanaku_test

      - name: Push schema to test DB
        working-directory: backend
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kanaku_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/kanaku_test

      - name: Type-check
        working-directory: backend
        run: npx tsc --noEmit --skipLibCheck
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kanaku_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/kanaku_test

      - name: Lint
        working-directory: backend
        run: npm run lint -- --max-warnings 0 || true

      - name: Run unit tests
        working-directory: backend
        run: npx jest --passWithNoTests --ci --forceExit --testPathIgnorePatterns="tests/integration"
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kanaku_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/kanaku_test
          JWT_SECRET: ci-test-secret-at-least-32-characters-long
          SUPABASE_URL: http://localhost:54321
          SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_KEY: test-service-key
          SUPABASE_JWT_SECRET: test-jwt-secret
          FRONTEND_URL: http://localhost:9002

  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Vite / Vitest)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # Workspace-aware install at the repo root (single hoisted lockfile).
      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit --skipLibCheck

      - name: Lint
        working-directory: frontend
        run: npx eslint "src/**/*.{ts,tsx}" --max-warnings 0 || true

      - name: Run unit tests
        working-directory: frontend
        run: npx vitest run --reporter=verbose --passWithNoTests
        env:
          NODE_ENV: test
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_ANON_KEY: test-anon-key
          VITE_API_URL: /api/v1
