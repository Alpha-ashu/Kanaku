name: CI — Lint, Type-check & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend (Node.js / Jest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kanaku_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/kanaku_test' }}
          DIRECT_URL: ${{ secrets.TEST_DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/kanaku_test' }}

      - name: Push schema to test DB
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/kanaku_test' }}
          DIRECT_URL: ${{ secrets.TEST_DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/kanaku_test' }}

      - name: Type-check
        run: npx tsc --noEmit --skipLibCheck
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/kanaku_test' }}
          DIRECT_URL: ${{ secrets.TEST_DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/kanaku_test' }}

      - name: Lint
        run: npx eslint "src/**/*.ts" --max-warnings 0

      - name: Run unit tests
        run: npx jest --passWithNoTests --ci --forceExit --testPathIgnorePatterns="tests/integration"
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/kanaku_test' }}
          DIRECT_URL: ${{ secrets.TEST_DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/kanaku_test' }}
          JWT_SECRET: ci-test-secret-at-least-32-characters-long
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'http://localhost:54321' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'test-anon-key' }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || 'test-service-key' }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET || 'test-jwt-secret' }}
          FRONTEND_URL: http://localhost:9002

  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Vite / Vitest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Type-check
        run: npx tsc --noEmit --skipLibCheck

      - name: Lint
        run: npx eslint "src/**/*.{ts,tsx}" --max-warnings 0 || true

      - name: Run unit tests
        run: npx vitest run --reporter=verbose --passWithNoTests
        env:
          NODE_ENV: test
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_ANON_KEY: test-anon-key
          VITE_API_URL: http://localhost:9002/api/v1
