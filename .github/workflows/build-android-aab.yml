name: Build Android AAB (Release)

on:
  push:
    branches: [main]
    paths:
      - "frontend/src/**"
      - "frontend/public/**"
      - "android/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "capacitor.config.*"
      - ".github/workflows/build-android-aab.yml"
  workflow_dispatch:
    inputs:
      build_variant:
        description: 'Build variant (debug or release)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Build frontend for Capacitor
        run: npm run build:frontend

      - name: Run Capacitor sync
        run: npx cap sync android

      - name: Decode keystore (release builds)
        if: |
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.build_variant == 'release')
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/finance-life-release.keystore

      - name: Build APK (Debug)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_variant == 'debug'
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Build AAB (Release)
        if: |
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.build_variant == 'release')
        env:
          KEYSTORE_PATH: finance-life-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: finance-life
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          cat > key.properties << EOF
          storeFile=../$KEYSTORE_PATH
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          ./gradlew bundleRelease --no-daemon
          rm -f key.properties

      - name: Upload Debug APK artifact
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_variant == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload Release AAB artifact
        if: |
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.build_variant == 'release')
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Clean up keystore
        if: always()
        run: rm -f android/finance-life-release.keystore android/key.properties

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "- Debug APK: ✅ Built successfully" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "android/app/build/outputs/bundle/release/app-release.aab" ]; then
            echo "- Release AAB: ✅ Built successfully" >> $GITHUB_STEP_SUMMARY
          fi
