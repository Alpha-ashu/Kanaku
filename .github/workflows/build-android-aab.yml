name: Build Android AAB (Release)
# Optional signing secrets are read at runtime via `toJSON(secrets)` + jq rather than direct
# `secrets.NAME` access, so the linter does not flag references to (possibly undefined) secrets.

on:
  push:
    branches: [main]
    paths:
      - "frontend/src/**"
      - "frontend/public/**"
      - "android/**"
      - "frontend/package.json"
      - "package-lock.json"
      - "capacitor.config.*"
      - ".github/workflows/build-android-aab.yml"
  workflow_dispatch:
    inputs:
      build_variant:
        description: 'Build variant (debug or release)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" || true

      - name: Make gradlew executable
        run: chmod +x gradlew
        working-directory: android

      # Workspace-aware install at the repo root installs both workspaces (incl. frontend).
      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
        working-directory: .

      - name: Build frontend for Capacitor
        run: npm run build
        working-directory: frontend

      - name: Run Capacitor sync
        run: npx cap sync android
        working-directory: .

      - name: Decode keystore (release builds)
        if: |
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.build_variant == 'release')
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: |
          KEYSTORE_BASE64="$(echo "$ALL_SECRETS" | jq -r '.ANDROID_KEYSTORE_BASE64 // ""')"
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/finance-life-release.keystore
          else
            echo "WARNING: ANDROID_KEYSTORE_BASE64 not set, generating self-signed keystore for dummy release build"
            keytool -genkey -v -keystore android/finance-life-release.keystore -alias finance-life -keyalg RSA -keysize 2048 -validity 10000 -storepass dummypass -keypass dummypass -dname "CN=Dummy, O=Dummy, C=US"
          fi

      - name: Build APK (Debug)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_variant == 'debug'
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Build AAB (Release)
        if: |
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.build_variant == 'release')
        env:
          KEYSTORE_PATH: finance-life-release.keystore
          KEY_ALIAS: finance-life
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: |
          cd android
          KEYSTORE_PASSWORD="$(echo "$ALL_SECRETS" | jq -r '.ANDROID_KEYSTORE_PASSWORD // ""')"
          KEY_PASSWORD="$(echo "$ALL_SECRETS" | jq -r '.ANDROID_KEY_PASSWORD // ""')"
          if [ -n "$KEYSTORE_PASSWORD" ]; then
               printf 'storeFile=../%s\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' "$KEYSTORE_PATH" "$KEYSTORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" > key.properties
          else
               echo "WARNING: ANDROID_KEYSTORE_PASSWORD not set, creating dummy key.properties for self-signed build"
               printf 'storeFile=../%s\nstorePassword=dummypass\nkeyAlias=finance-life\nkeyPassword=dummypass\n' "$KEYSTORE_PATH" > key.properties
          fi
          ./gradlew bundleRelease --no-daemon
          rm -f key.properties

      - name: Upload Debug APK artifact
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_variant == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload Release AAB artifact
        if: |
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.build_variant == 'release')
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Clean up keystore
        if: always()
        run: rm -f android/finance-life-release.keystore android/key.properties

      - name: Build summary
        if: always()
        # Branch/event names go through env, not direct ${{ }} interpolation in
        # the shell (CodeQL: expression/script injection in GitHub Actions).
        env:
          BRANCH: ${{ github.ref_name }}
          EVENT: ${{ github.event_name }}
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: $BRANCH" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered by: $EVENT" >> $GITHUB_STEP_SUMMARY
          if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "- Debug APK: ✅ Built successfully" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "android/app/build/outputs/bundle/release/app-release.aab" ]; then
            echo "- Release AAB: ✅ Built successfully" >> $GITHUB_STEP_SUMMARY
          fi
