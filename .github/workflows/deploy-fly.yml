name: Deploy Backend → Fly.io
# DATABASE_URL below is a build-time placeholder for `prisma generate` (it does not connect);
# the real database URL is provided as a Fly.io runtime secret, not a GitHub Actions secret.

on:
  push:
    branches: [main]
    paths:
      - "backend/src/**"
      - "backend/prisma/**"
      - "backend/package.json"
      - "backend/package-lock.json"
      - "backend/tsconfig.json"
      - "fly.toml"
      - "Dockerfile"
      - ".github/workflows/deploy-fly.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # Workspace-aware install at the repo root (single hoisted lockfile).
      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kanaku
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/kanaku

      - name: Build backend
        run: npm run build:backend

      - name: Setup Flyctl
        # Pinned to the stable v1 release tag instead of the mutable @master
        # branch to avoid pulling unreviewed action code at deploy time.
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy to Fly.io
        # Skip gracefully (don't fail the run) when FLY_API_TOKEN is not
        # configured, so the workflow stays green until deployment is wired up.
        # Add the secret under Settings → Secrets and variables → Actions to
        # enable real deploys. Mirrors the Android workflow's keystore fallback.
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::warning::FLY_API_TOKEN is not set — skipping deploy. Add it in Settings → Secrets and variables → Actions to enable Fly.io deployment."
            exit 0
          fi
          flyctl deploy --remote-only --config fly.toml