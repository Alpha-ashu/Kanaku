name: Deploy Backend → Fly.io

on:
  push:
    branches: [main]
    paths:
      - "backend/src/**"
      - "backend/prisma/**"
      - "backend/package.json"
      - "backend/package-lock.json"
      - "backend/tsconfig.json"
      - "fly.toml"
      - "Dockerfile"
      - ".github/workflows/deploy-fly.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # Workspace-aware install at the repo root (single hoisted lockfile).
      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/kanaku' }}
          DIRECT_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/kanaku' }}

      - name: Build backend
        run: npm run build:backend

      - name: Setup Flyctl
        # Pinned to the stable v1 release tag instead of the mutable @master
        # branch to avoid pulling unreviewed action code at deploy time.
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}