name: Backend Feature Matrix

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-feature-matrix.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-feature-matrix.yml'
  workflow_dispatch:

jobs:
  feature-matrix:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync Prisma schema
        if: env.DATABASE_URL != ''
        run: npx prisma db push

      - name: Build backend
        run: npm run build

      - name: Seed admin QA data
        run: npm run qa:seed-admin

      - name: Start backend API
        run: npm run dev > backend-dev.log 2>&1 &

      - name: Wait for health endpoint
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:3000/health > /dev/null; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time"
          exit 1

      - name: Run feature matrix test
        shell: pwsh
        run: ./scripts/run-feature-matrix.ps1

      - name: Upload backend dev log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-dev-log
          path: backend/backend-dev.log
