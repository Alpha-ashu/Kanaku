version: 2
updates:
  # Root workspace — covers all npm workspaces (root + backend + frontend)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      all-deps:
        patterns: ["*"]

  # Python receipt_ai dependencies
  - package-ecosystem: "pip"
    directory: "/backend/receipt_ai"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      all-deps:
        patterns: ["*"]
