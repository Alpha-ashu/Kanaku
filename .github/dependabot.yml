version: 2
updates:
  # Root workspace npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      security-patches:
        applies-to: security-updates
        patterns: ["*"]

  # Backend npm dependencies
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
    groups:
      security-patches:
        applies-to: security-updates
        patterns: ["*"]

  # Frontend npm dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    groups:
      security-patches:
        applies-to: security-updates
        patterns: ["*"]

  # Python receipt_ai dependencies
  - package-ecosystem: "pip"
    directory: "/backend/receipt_ai"
    schedule:
      interval: "weekly"
    groups:
      security-patches:
        applies-to: security-updates
        patterns: ["*"]
