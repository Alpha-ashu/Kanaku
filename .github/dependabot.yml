version: 2
updates:
  # Root workspace — covers all npm workspaces (root + backend + frontend)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      all-deps:
        patterns: ["*"]

  # Python receipt_ai dependencies
  - package-ecosystem: "pip"
    directory: "/backend/receipt_ai"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      all-deps:
        patterns: ["*"]

  # GitHub Actions used by CI/CD workflows (supply-chain coverage)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      all-actions:
        patterns: ["*"]

  # Android (Gradle) dependencies for the Capacitor shell
  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      all-gradle:
        patterns: ["*"]

