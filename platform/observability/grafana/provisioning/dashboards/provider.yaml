apiVersion: 1

# Auto-load the dashboard JSONs (the Phase 3 API/Worker/Notification dashboards +
# the Phase 4 Audit dashboard) from a mounted directory.
providers:
  - name: kanaku
    orgId: 1
    folder: KANAKU
    type: file
    # Git is the source of truth: provisioned dashboards are READ-ONLY in the UI.
    # Changes must be committed to platform/observability/dashboards/ and
    # redeployed — production UI edits cannot silently become the primary source.
    disableDeletion: true
    allowUiUpdates: false
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
