apiVersion: 1

# Two datasources:
#  - Loki: our centralized log store (self-hosted here, or Grafana Cloud Loki).
#  - Prometheus: Fly ALREADY scrapes /metrics:9091 from app + worker into its
#    managed Prometheus, so we just point at it (no Prometheus to run ourselves).
datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: $__env{LOKI_URL}
    isDefault: false
    jsonData:
      maxLines: 1000

  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    # https://api.fly.io/prometheus/<org-slug>  (org = "personal" for kanaku)
    url: $__env{PROMETHEUS_URL}
    isDefault: true
    jsonData:
      httpHeaderName1: Authorization
    secureJsonData:
      httpHeaderValue1: Bearer $__env{FLY_PROMETHEUS_TOKEN}

# DELIBERATELY NO Postgres/AuditDB datasource: Grafana must never have a network
# path or credentials to the production database. Audit visibility comes entirely
# from the centralized log stream — the Prisma interceptor emits a redacted
# `[AUDIT]` log line for every financial mutation (alongside the immutable
# AuditLog DB row), and audit() emits one for security/auth events. The audit
# dashboard queries those via Loki. The immutable AuditLog table remains the
# authoritative system-of-record, untouched by Grafana.
