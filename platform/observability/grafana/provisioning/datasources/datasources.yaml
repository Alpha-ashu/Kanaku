apiVersion: 1

# Two datasources:
#  - Loki: our centralized log store (self-hosted here, or Grafana Cloud Loki).
#  - Prometheus: Fly ALREADY scrapes /metrics:9091 from app + worker into its
#    managed Prometheus, so we just point at it (no Prometheus to run ourselves).
datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: ${LOKI_URL:-http://loki:3100}
    isDefault: false
    jsonData:
      maxLines: 1000

  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    # https://api.fly.io/prometheus/<org-slug>  (org = "personal" for kanaku)
    url: ${PROMETHEUS_URL:-https://api.fly.io/prometheus/personal}
    isDefault: true
    jsonData:
      httpHeaderName1: Authorization
    secureJsonData:
      httpHeaderValue1: Bearer ${FLY_PROMETHEUS_TOKEN}

  # Read-only connection to the immutable AuditLog table — the authoritative
  # audit source (all financial mutations + events). Use a READ-ONLY DB role.
  - name: AuditDB
    uid: auditdb
    type: postgres
    access: proxy
    url: ${AUDIT_DB_HOST}
    user: ${AUDIT_DB_USER}
    database: ${AUDIT_DB_NAME:-postgres}
    isDefault: false
    jsonData:
      sslmode: require
      postgresVersion: 1500
    secureJsonData:
      password: ${AUDIT_DB_PASSWORD}
