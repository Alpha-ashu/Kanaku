apiVersion: 1

# Routing + escalation. Default → ops-email. `critical`-labelled alerts notify
# faster and re-fire hourly until resolved (escalation by repeat); `warning`
# re-fires every 4h. Add a Slack/PagerDuty contact point + a matching route here
# when a paging path is wanted.
policies:
  - orgId: 1
    receiver: ops-email
    group_by: ['alertname']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: ops-email
        object_matchers:
          - ['severity', '=', 'critical']
        group_wait: 10s
        group_interval: 5m
        repeat_interval: 1h
        continue: false
