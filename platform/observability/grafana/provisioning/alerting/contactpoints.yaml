apiVersion: 1

# Email contact point — delivered through our existing SendGrid SMTP (configured
# via GF_SMTP_* in fly.observability.toml; password = SENDGRID_API_KEY secret).
contactPoints:
  - orgId: 1
    name: ops-email
    receivers:
      - uid: ops-email
        type: email
        settings:
          addresses: $__env{ALERT_EMAIL}
          singleEmail: false
