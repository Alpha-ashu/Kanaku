app = 'kanaku'
primary_region = 'sin'

[build]
  dockerfile = 'backend/Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT     = '3000'

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes           = ['app']

  [http_service.concurrency]
    type       = 'connections'
    hard_limit = 1000
    soft_limit = 800

  [[http_service.checks]]
    interval     = '15s'
    timeout      = '5s'
    grace_period = '10s'
    method       = 'GET'
    path         = '/health'

[[vm]]
  memory   = '1gb'
  cpu_kind = 'shared'
  cpus     = 1

[[metrics]]
  port = 9091
  path = '/metrics'
